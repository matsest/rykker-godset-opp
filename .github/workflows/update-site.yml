name: Update and deploy site

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'templates/**'
      - 'site/**'
      - 'Makefile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/update-site.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'           # Hver dag 05:00 CEST – morgenoppdatering
    - cron: '30 17 * * 0,3,5,6'   # Søn/Ons/Fre/Lør 19:30 CEST – etter ettermiddagskamper
    - cron: '30 19 * * 0,3,5,6'   # Søn/Ons/Fre/Lør 21:30 CEST – etter kveldskamper

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync

      - name: Cache NIFS data
        uses: actions/cache@v5
        with:
          path: data/raw/
          key: nifs-data-${{ github.run_id }}
          restore-keys: |
            nifs-data-

      - name: Build site
        run: make ci

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
